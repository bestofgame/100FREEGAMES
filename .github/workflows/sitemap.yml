name: Generate sitemap

on:
  push:
    branches: [ main ]  # Vérifiez que c'est bien 'main' votre branche

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Generate a sitemap
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate the sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://bestofgame.github.io/100FREEGAMES/
        # FORCE l'extension .html pour éviter les URLs sans slash
        drop-html-extension: false
        # EXCLURE le fichier de vérification Google
        exclude-paths: google5b789ca3d3295c98.html

    - name: Commit and push
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        # On ajoute le sitemap généré
        git add sitemap.xml
        
        # On commit et push seulement s'il y a des changements
        if git diff --staged --quiet; then
          echo "Aucun changement détecté dans le sitemap."
        else
          git commit -m "Automated sitemap update (with index.html and exclusions)"
          git push
        fi
