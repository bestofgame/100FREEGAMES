
name: Generate sitemap

on:
  push:
    branches: [ main ]  # Remplacez par le nom de votre branche principale

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    name: Generate a sitemap
    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Important pour que l'action puisse lire l'historique des dates

    - name: Generate the sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://bestofgame.github.io/100FREEGAMES/

    - name: Commit and push
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        # On n'ajoute que le XML qui est généré par défaut
        git add sitemap.xml
        
        # On vérifie s'il y a des changements avant de pusher
        if git diff --staged --quiet; then
          echo "Aucun changement détecté dans le sitemap."
        else
          git commit -m "Automated sitemap update"
          git push
        fi
